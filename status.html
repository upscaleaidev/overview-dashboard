<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Status — Firebase Raw</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  body{background:#060609;color:#f0f0f5;font-family:'Fira Code',monospace;padding:24px;margin:0}
  h1{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:16px;font-family:sans-serif}
  pre{white-space:pre-wrap;word-break:break-all;font-size:12px;line-height:1.6}
  .err{color:#f87171}
  .ok{color:#4ade80}
</style>
</head>
<body>
<h1>Firebase · dashboards/main · raw JSON</h1>
<pre id="out">Chargement...</pre>
<script>
  const out = document.getElementById('out');
  const cfg = JSON.parse(localStorage.getItem('jtb3_fb') || 'null');
  if (!cfg || !cfg.apiKey || !cfg.databaseURL) {
    out.className = 'err';
    out.textContent = 'Aucune config Firebase trouvée dans localStorage (jtb3_fb).\nConfigure Firebase dans l\'app principale d\'abord.';
  } else {
    try {
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      firebase.database().ref('dashboards/main').once('value').then(snap => {
        const data = snap.val();
        out.className = data ? 'ok' : '';
        out.textContent = data ? JSON.stringify(data, null, 2) : 'Aucune donnée à dashboards/main.';
      }).catch(e => {
        out.className = 'err';
        out.textContent = 'Erreur Firebase : ' + e.message;
      });
    } catch(e) {
      out.className = 'err';
      out.textContent = 'Erreur init Firebase : ' + e.message;
    }
  }
</script>
</body>
</html>
